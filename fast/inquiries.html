<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="../" />
    <link rel="icon" href="assets/icons/logo.webp" />
    <title>الاستفسارات - المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <style>
      .inq-wrap {
        width: min(800px, 92%);
        margin: 150px auto 60px;
        background: #fff;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        direction: rtl;
      }
      .inq-title {
        text-align: center;
        color: #e4293a;
        font-weight: 900;
        font-size: 28px;
        margin-bottom: 18px;
      }
      .inq-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .inq-grid input, .inq-grid textarea {
        width: 100%;
        padding: 14px 18px;
        border-radius: 12px;
        border: 2px solid #eee;
        outline: none;
        font-family: 'Tajawal', sans-serif;
        transition: border-color 0.3s;
      }
      .inq-grid input:focus, .inq-grid textarea:focus {
        border-color: #e4293a;
      }
      .inq-grid textarea {
        grid-column: 1 / -1;
        min-height: 160px;
        resize: vertical;
      }
      .inq-actions {
        margin-top: 25px;
        display: flex;
        justify-content: center;
      }
      .inq-actions button {
        background: #e4293a;
        color: #fff;
        border: none;
        padding: 14px 40px;
        border-radius: 30px;
        font-weight: 900;
        cursor: pointer;
        transition: 0.3s;
        font-size: 16px;
      }
      .inq-actions button:hover {
        background: #b71c1c;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(228, 41, 58, 0.3);
      }
      @media (max-width: 600px) {
        .inq-wrap { margin-top: 120px; padding: 25px 20px; }
        .inq-title { font-size: 22px; }
        .inq-grid { grid-template-columns: 1fr; }
        .inq-actions button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="page-content">
      <div class="inq-wrap">
        <div class="inq-title">نحن هنا للرد على جميع استفساراتكم</div>
        <form id="inq-form">
          <div class="inq-grid">
            <input id="inq-name" placeholder="الاسم" required />
            <input id="inq-email" type="email" placeholder="البريد الإلكتروني" required />
            <input id="inq-org" placeholder="اسم الجهة" />
            <input id="inq-phone" placeholder="رقم التلفون" />
            <textarea id="inq-msg" placeholder="استفسارك" required></textarea>
          </div>
          <div class="inq-actions">
            <button type="submit">إرسال الاستفسار</button>
          </div>
        </form>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
      // ارسال تحذير في حال لم يتم تعبئة النموذج
      const form = document.getElementById("inq-form");
      if (form) {
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const name = document.getElementById("inq-name")?.value || "";
          const email = document.getElementById("inq-email")?.value || "";
          const org = document.getElementById("inq-org")?.value || "";
          const phone = document.getElementById("inq-phone")?.value || "";
          const msg = document.getElementById("inq-msg")?.value || "";

          const subject = encodeURIComponent("استفسار من موقع AISS");
          const body = encodeURIComponent(
            `الاسم: ${name}\nالبريد: ${email}\nاسم الجهة: ${org}\nالجوال: ${phone}\n\nالرسالة:\n${msg}`
          );
          window.location.href = `mailto:aiss@aiss.co?subject=${subject}&body=${body}`;
        });
      }
    </script>
        <script src="js/script.js"></script>
    <script src="js/auth-toggle.js"></script>
  </body>
</html>
