<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/icons/logo.webp" />
    <title>لوحة التحكم - المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      .dashboard-wrapper {
        max-width: 1200px;
        margin: 140px auto 40px;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 30px;
      }
      .db-sidebar {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        height: fit-content;
      }
      .db-sidebar ul {
        list-style: none;
        padding: 0;
      }
      .db-sidebar li {
        margin-bottom: 10px;
      }
      .db-sidebar a {
        display: block;
        padding: 12px 15px;
        border-radius: 10px;
        color: #444;
        font-weight: bold;
        transition: 0.3s;
      }
      .db-sidebar a:hover,
      .db-sidebar a.active {
        background: #f0f4f8;
        color: #e4293a;
      }

      .db-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-item {
        background: #fff;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border-top: 4px solid #235287;
      }
      .stat-item h4 {
        color: #888;
        font-size: 14px;
        margin-bottom: 10px;
      }
      .stat-item .val {
        font-size: 28px;
        font-weight: 800;
        color: #235287;
      }

      .db-table-container {
        background: #fff;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      th,
      td {
        padding: 15px;
        text-align: right;
        border-bottom: 1px solid #eee;
      }
      th {
        background: #f9f9f9;
        color: #235287;
      }

      @media (max-width: 768px) {
        .dashboard-wrapper {
          grid-template-columns: 1fr;
          margin-top: 100px;
        }
        .db-sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="dashboard-wrapper">
      <aside class="db-sidebar">
        <h3 style="color: #235287; margin-bottom: 20px">القائمة</h3>
        <ul>
          <li><a href="add_article.html">إضافة مقال </a></li>
          <li><a href="add_magazine.html">إضافة مجلة</a></li>
          <li></li>
          <li><a href="add_manuals.html">إضافة كتيب</a></li>
          <li></li>
          <li><a href="add_tags.html">إضافة الوسوم</a></li>
          <li></li>
        </ul>
      </aside>

      <main class="db-content">
        <div class="db-stats">
          <div class="stat-item">
            <h4>مرحباً بك</h4>
            <div class="val" id="user-welcome">...</div>
          </div>
        </div>

        <div class="db-table-container">
          <h3 style="color: #e4293a">آخر النشاطات</h3>
          <table>
            <thead>
              <tr>
                <th>التاريخ</th>
                <th>النشاط</th>
                <th>الحالة</th>
              </tr>
            </thead>
            <tbody id="activity-body">
              <tr>
                <td style="display: flex; align-items: center;margin-right: 10px;">2026</td>
                <td>تسجيل دخول للنظام:</td>
                <td style="color: green; font-weight: bold">ناجح</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script>
      // تحديث اسم المستخدم في لوحة التحكم عند التحميل
      window.addEventListener("load", () => {
        fetch("api/check_user_auth.php")
          .then((r) => r.json())
          .then((data) => {
            if (data.authenticated)
              document.getElementById("user-welcome").innerText =
                data.user.name;
            else window.location.href = "index.html";
          });
      });
    </script>
    <script src="js/auth-toggle.js"></script>
  </body>
</html>
