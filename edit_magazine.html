<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/icons/logo.webp" />
    <title>تعديل مقال - المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>
    <style>
      .editor-wrapper {
        max-width: 1200px;
        margin: 140px auto 40px;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 30px;
      }
      .db-sidebar {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        height: fit-content;
      }
      .db-sidebar ul {
        list-style: none;
        padding: 0;
      }
      .db-sidebar li {
        margin-bottom: 10px;
      }
      .db-sidebar a {
        display: block;
        padding: 12px 15px;
        border-radius: 10px;
        color: #444;
        font-weight: bold;
        transition: 0.3s;
      }
      .db-sidebar a:hover,
      .db-sidebar a.active {
        background: #f0f4f8;
        color: #e4293a;
      }
      .form-box {
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #235287;
      }
      .form-group input[type="text"],
      .form-group input[type="file"],
      .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: inherit;
        margin-bottom: 10px;
      }
      .save-btn {
        background: #235287;
        color: #fff;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }
      .save-btn:hover {
        background: #1a3c63;
      }
      @media (max-width: 768px) {
        .editor-wrapper {
          grid-template-columns: 1fr;
          margin-top: 100px;
        }
        .db-sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="editor-wrapper">
        <aside class="db-sidebar">
            <h3 style="color: #235287; margin-bottom: 20px;">القائمة</h3>
            <ul>
                <li><a href="dashboard.html">الرجوع</a></li>
                <li><a href="#" class="active">تعديل المجلة</a></li>
            </ul>
        </aside>
        <main class="form-box">
              
            
            <h2 style="color: #235287; margin-bottom: 25px;"> تعديل المجلة</h2>
            <div class="form-group">
                <label>عنوان الكتيب:</label>
                <input type="text" id="title" placeholder="أدخل عنوان المجلة هنا...">
                <label>المجلة باللغة الانجليزية:</label>
                <input type="text" id="slug" placeholder="أدخل اسم المجلة بالانجليزي...">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>صورة المجلة:</label>
                    <input type="file" id="cover_image" accept=".jpg,.jpeg,.png,.webp">
                </div>
                <div class="form-group">
                    <label>ملف المجلة:</label>
                    <input type="file" id="file" accept=".pdf">
                </div>
            </div>
            
            <button class="save-btn" onclick="saveMagazineChanges()">حفظ ونشر التعديل</button>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
  <script>
    // 1. جلب المعرف من الرابط وتنظيفه
    const params = new URLSearchParams(window.location.search);
    const rawId = params.get("id"); 
    // استخراج الرقم فقط (مثلاً من "5-june-issue" يأخذ 5)
    const magazineId = rawId ? rawId.split('-')[0] : null;

    // 2. دالة جلب بيانات المجلة عند تحميل الصفحة
    async function loadMagazineData() {
        if (!magazineId) return;

        try {
            // تأكد أن المسار هو get_magazine.php
            const response = await fetch(`api/get_magazine.php?id=${magazineId}`);
            const data = await response.json();

            if (data.success) {
              
                // تعبئة الحقول (تأكد أن الـ ID في الـ HTML مطابق لهذه الأسماء)
                if(document.getElementById("title")) document.getElementById("title").value = data.magazine.title;
                if(document.getElementById("slug")) document.getElementById("slug").value = data.magazine.slug || "";
            } else {
                alert("فشل في جلب بيانات المجلة: " + data.message);
            }
        } catch (err) {
            console.error("Error loading data:", err);
        }
    }

    // 3. دالة حفظ التعديلات
   async function saveMagazineChanges() {
        const formData = new FormData();
        
        // جلب القيم من العناصر
        const titleEl = document.getElementById("title");
        const slugEl = document.getElementById("slug");
        
        if (!titleEl || !slugEl) {
            console.error("عناصر الإدخال غير موجودة في الصفحة");
            return;
        }

        const title = titleEl.value;
        const slug = slugEl.value;
        const coverFile = document.getElementById("cover_image").files[0];
        const pdfFile = document.getElementById("file").files[0];

        formData.append("magazine_id", magazineId);
        formData.append("title", title);
        formData.append("slug", slug);
        
        if (coverFile) formData.append("cover_image", coverFile);
        if (pdfFile) formData.append("file", pdfFile);

        try {
            // تأكد أن اسم الملف هو update_magazine.php
            const response = await fetch("api/update_magazine.php", { 
                method: "POST", 
                body: formData 
            });
            
            const data = await response.json();

            if (data.success) {
                alert("تم تحديث المجلة بنجاح!");
                // التوجيه لصفحة المجلات (تأكد من الحروف)
                window.location.replace("magazine.html"); 
            } else {
                alert("خطأ: " + data.message);
            }
        } catch (err) {
            console.error("Error updating:", err);
            alert("خطأ في الاتصال بالسيرفر");
        }
    }

    // 4. تشغيل العمليات عند تحميل الصفحة
    window.addEventListener("DOMContentLoaded", () => {
        // استدعاء دالة الجلب الصحيحة
        loadMagazineData();
        
        // التحقق من الصلاحيات
        fetch("api/check_user_auth.php")
            .then(r => r.json())
            .then(data => {
                if (!data.authenticated || (data.user.role != 'admin' && data.user.can_add_article != 1)) {
                    window.location.href = 'index.html';
                }
            });
    });
</script>
  </body>
</html>
