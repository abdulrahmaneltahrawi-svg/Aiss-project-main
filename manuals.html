    <script>   
    

function createCardHTML(item, btnText = "عرض الكتيب", index = 0) {
    // 1. تجهيز البيانات الأساسية بنفس منطق المدونة
    const slug = (item.slug || (item.title || "").trim().replace(/[^\u0600-\u06FFa-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '') || "manual");
    const idParam = `${item.id}-${slug}`;
    const href = `flipbook.html?id=${idParam}&source=manuals`;
    const image = item.img || item.cover_image || 'assets/magazine/placeholder.webp';

    return `
      <div class="card1" id="booklet-card-${item.id}">
        <a href="${href}">
          <img src="${image}" alt="${item.title || "صورة الكتيب"}" 
               
               loading="lazy" onerror="this.onerror=null; this.src='assets/magazine/placeholder.webp';">
        </a>
        
        <div class="class-content1" ">
          <h3 >
            ${item.title}
          </h3>
          
          <a href="${href}" class="btn1" ">${btnText}</a>
          
          <div class="admin-only" ">
            <a href="edit_manuals.html?id=${item.id}" 
               class="btn1" 
               style="background:#235287; color:white; text-align:center; padding: 6px 2px; font-size: 12px;">
               تعديل
            </a>
            <button onclick="deleteBooklet(${item.id})" 
               class="btn1" 
               style="background:#e4293a; color:white; border:none; cursor:pointer; padding: 10px 5px; font-size: 12px;">
               حذف
            </button>
          </div>
        </div>
      </div>
    `;
}

async function fetchManualsFromDB() {
    const container = document.getElementById('manuals-grid');
    if (!container) return;

    try {
        const response = await fetch("api/get_booklets.php");
        
        // هنا يتم تعريف jsonResponse
        const jsonResponse = await response.json(); 

        // يجب أن يكون كل التعامل مع jsonResponse داخل هذا البلوك { ... }
        if (jsonResponse.success && jsonResponse.booklets) {
            container.innerHTML = jsonResponse.booklets.map((item, index) => {
                const formattedItem = {
                    // تأكد من الأسماء القادمة من قاعدة البيانات (id أو booklet_id)
                    id: item.id || item.booklet_id, 
                    title: item.title,
                    slug: item.slug,
                    img: item.cover_image 
                };
                return createCardHTML(formattedItem, "عرض الكتيب", index);
            }).join('');
        } else {
            console.error("السيرفر أرسل نجاح false:", jsonResponse.message);
        }

    } catch (error) {
        // في حال فشل الـ Fetch تماماً
        console.error("خطأ في جلب الكتيبات:", error);
        container.innerHTML = "<p>حدث خطأ أثناء تحميل الكتيبات.</p>";
    }
}

// 3. تشغيل الكل عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', () => {
    // تشغيل جلب الكتيبات
    fetchManualsFromDB();
    
    // التأكد من تشغيل الهيدر في حال لم يعمل تلقائياً من script.js
    if (typeof loadLayout === "function") {
        loadLayout();
    }
});

async function deleteBooklet(id) {
    if (!confirm("هل أنت متأكد من حذف كتيب السلامة هذا نهائياً؟")) return;

    try {
        const formData = new FormData();
        // التعديل هنا: غيرنا manual_id إلى booklet_id ليتطابق مع الـ PHP
        formData.append('booklet_id', id); 

        const response = await fetch('api/delete_booklet.php', { 
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (result.success) {
            alert("تم حذف الكتيب بنجاح");
            const card = document.getElementById(`booklet-card-${id}`);
            if (card) card.remove();
        } else {
            // الآن ستعرف إذا كان هناك مشكلة أخرى مثل Unauthorized
            alert("فشل الحذف: " + result.message);
        }
    } catch (error) {
        console.error("Error:", error);
        alert("حدث خطأ في الاتصال بالسيرفر");
    }
}
