<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" type="image/webp" href="assets/icons/logo.webp" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>المدونات-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>

  <style>
    /* تقييد ارتفاع الكرت ومنع التمدد */
.card1 {
    height: fit-content !important; /* يجعل الكرت على قد محتواه فقط */
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    max-width: 300px; /* العرض الذي اتفقنا عليه */
}

/* التأكد من أن حاوية النصوص لا تدفع الأزرار للأسفل بمسافات ضخمة */
.class-content1 {
    padding: 15px !important;
    display: flex;
    flex-direction: column;
    gap: 8px !important; /* مسافة بسيطة بين العناصر */
}

/* تثبيت حجم الصورة لمنعها من أخذ نصف الصفحة */
.card-img-link img {
    height: 250px !important; /* ارتفاع متناسق للمدونات والكتيبات */
    width: 100%;
    object-fit: cover;
}
  </style>

  <body>
    <div id="header-placeholder"></div>

    <!--قسم صفحة العرض-->

    <div class="hero-section-m">
      <img src="assets/imge/0006.jpg" alt="blogs-pic" loading="lazy" />
      <div class="logo-text"><p>المدونات</p></div>
    </div>

    <div class="title0">
      <p>كتابات و مدونات</p>
    </div>

    <div class="blogs-filter">
      <label for="blog-category">التصنيف:</label>
      <select id="blog-category">
        <option value="all">الكل</option>
      </select>
    </div>

    <div id="blogs-grid" class="card-container1" style="min-height: 600px;"></div> <!-- حجز مساحة افتراضية للشبكة -->

    <div class="load-more-btn-container">
      <button id="load-more-blogs" class="btn1">عرض المزيد</button>
    </div>


    <script>
          

      const grid = document.getElementById("blogs-grid");
      const categorySelect = document.getElementById("blog-category");
      const params = new URLSearchParams(window.location.search);
      let isFirstBlogLoad = true;
      const initialCat = params.get("cat");
      const PAGE_NAME = "blogs.html";
      
      let displayedBlogs = 0;
      const blogsPerPage = 8;
      let allBlogs = (typeof myCards !== 'undefined' ? myCards : []); 
      let currentFilteredBlogs = [];

      // دالة تحميل المزيد من المدونات (عرض الكروت)
      async function loadMoreBlogs() {
        const nextBatch = currentFilteredBlogs.slice(displayedBlogs, displayedBlogs + blogsPerPage);
        if (nextBatch.length > 0) {
            const html = nextBatch.map((item, index) => renderBlogCard(item, displayedBlogs + index)).join("");
            grid.insertAdjacentHTML('beforeend', html);
            displayedBlogs += nextBatch.length;
            
            if (typeof checkAuthStatus === 'function') await checkAuthStatus();
            
            const loadMoreBtn = document.getElementById("load-more-blogs");
            if (loadMoreBtn) loadMoreBtn.style.display = (displayedBlogs < currentFilteredBlogs.length) ? "inline-block" : "none";
        }
      }

function renderBlogCard(item, index) {
    const slug = (item.title || "").trim().replace(/[^\u0600-\u06FFa-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    const idParam = item.source === 'db' ? `${item.id}-${slug}` : slug;
    const link = `views.html?id=${idParam}`;
    const image = item.image || item.cover_image || 'assets/magazine/placeholder.webp';

    return `
      <div class="card1 blog-card-fixed" id="blog-card-${item.id}">
        <a href="${link}" class="card-img-link">
          <img src="${image}" alt="${item.title || "صورة المدونة"} 
               loading="lazy" onerror="this.onerror=null; this.src='assets/magazine/placeholder.webp';">
        </a>
        
        <div class="class-content1" style="padding: 12px 10px; display: flex; flex-direction: column; gap: 8px;">
          <h3 style="font-size: 0.95rem; margin: 0; min-height: 2.6em; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; font-weight: bold;">
            ${item.title}
          </h3>
          
          <div style="margin-top: auto;">
              <a href="${link}" class="btn1" style="display: block; width: 100%; padding: 8px 0; font-size: 13px; margin: 0;">عرض المقال</a>
              
              ${item.source === 'db' ? `
                <div class="admin-only" style="display: none; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; width: 100%;">
                  <a href="edit_article.html?id=${item.id}" class="btn1 admin-btn" style="background:#235287; color:white; padding: 8px 5px; font-size: 12px; margin:0; text-align:center;">تعديل</a>
                  <button onclick="deleteArticle(${item.id})" class="btn1 admin-btn" style="background:#e4293a; border:1px solid black; color:white; cursor:pointer; padding: 8px 10px; font-size: 12px; margin:0;">حذف</button>
                </div>
              ` : ''}
          </div>
        </div>
      </div>
    `;
}

      function getCategory(item) {
        if (item.source === 'db') {
          if (item.type == 0) return "محتويات علمية";
          if (item.type == 1) return "مقالات الخبراء";
          if (item.type == 2) return "مقالات المجلة";
        }
        return item.category || "مقالات تجربه";
      }
      
//عرض الكروت عند الضغط على المزيد من الصفحات
      function initCategories() {
        if (!categorySelect) return;
        const cats = ["محتويات علمية", "مقالات الخبراء", "مقالات المجلة"];
        cats.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c;
          opt.textContent = c;
          categorySelect.appendChild(opt);
        });
      }

     async function applyFilter() {
    const val = categorySelect ? categorySelect.value : "all";
    let filtered = val === "all" ? allBlogs : allBlogs.filter((it) => getCategory(it) === val);

    currentFilteredBlogs = filtered;
    grid.innerHTML = "";
    displayedBlogs = 0;

    const initialBatch = currentFilteredBlogs.slice(0, blogsPerPage);
    if (currentFilteredBlogs.length === 0) {
        grid.innerHTML = '<p style="text-align:center; width:100%; padding:50px;">لا توجد مقالات لعرضها.</p>';
    } else {
        grid.innerHTML = initialBatch.map((item, index) => renderBlogCard(item, index)).join("");
        displayedBlogs = initialBatch.length;
    }

    const loadMoreBtn = document.getElementById("load-more-blogs");
    if (loadMoreBtn) loadMoreBtn.style.display = (displayedBlogs < currentFilteredBlogs.length) ? "inline-block" : "none";
    
    if (typeof checkAuthStatus === 'function') await checkAuthStatus();
}

// تحديد رابط الجلب: PHP الحالي يتطلب بارامتر "tag" للبحث في السلج (slug)
let fetchUrl = 'api/get_articles.php';

fetch(fetchUrl)
  .then(res => res.json())
  .then(dbData => {
    // استخراج المصفوفة حسب هيكل ملفاتك
    const articlesArray = dbData.articles || dbData.data || (Array.isArray(dbData) ? dbData : []);
    
    // ربط البيانات
    allBlogs = (articlesArray || []).map(a => ({ 
        ...a, 
        source: 'db',
        // توحيد مسميات الصور والروابط لتناسب دالة createCardHTML
        img: a.cover_image || a.image,
        title: a.title
    })).concat(typeof myCards !== 'undefined' ? myCards : []);

    initCategories();
    if (categorySelect) {
        if (initialCat) categorySelect.value = initialCat;
        categorySelect.addEventListener("change", applyFilter);
    }
    document.getElementById("load-more-blogs")?.addEventListener("click", loadMoreBlogs);
    applyFilter();
  })
  .catch(err => { console.error("Fetch Error:", err); applyFilter(); });


    </script>
    <!-- القسم الاخير-->

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/auth-toggle.js"></script>
  </body>
</html>
